spring.application.name=ms-employee
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.datasource.url=jdbc:postgresql://localhost:5432/database-employees
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#resilecnia

spring.webflux.timeout=2s

resilience4j.retry.instances.departmentService.max-attempts=3
resilience4j.retry.instances.departmentService.wait-duration=500ms

circuitbreaker.instances.departmentService.failure-rate-threshold= 50
circuitbreaker.instances.departmentService.wait-duration-in-open-state=10s
circuitbreaker.instances.departmentService.minimum-number-of-calls=5
circuitbreaker.instances.departmentService.sliding-window-size=10




